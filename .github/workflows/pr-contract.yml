name: PR Contract

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR body contract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s\n' "$PR_BODY" | grep -E "(Fixes|Closes|Resolves) #[0-9]+" >/dev/null \
            || { echo "PR body must include Fixes/Closes/Resolves #<issue-number>"; exit 1; }
          printf '%s\n' "$PR_BODY" | grep -E "(TDD Evidence|Tests|Test Plan|No-test justification)" >/dev/null \
            || { echo "PR body must include test evidence or a no-test justification"; exit 1; }
      - name: Require tests for code changes
        env:
          BASE_REF: ${{ github.base_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF"
          changed="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          code_changed="$(printf '%s\n' "$changed" | grep -E '\.py$' || true)"
          if [ -z "$code_changed" ]; then
            exit 0
          fi
          test_changed="$(printf '%s\n' "$changed" | grep -E '(^tests/|/tests/|test_)' || true)"
          if [ -n "$test_changed" ]; then
            exit 0
          fi
          printf '%s\n' "$PR_BODY" | grep -Ei "no-test justification|docs-only|config-only" >/dev/null \
            || { echo "Python code PRs require tests or explicit no-test justification."; exit 1; }
